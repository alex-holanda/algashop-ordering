name: CI

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ main ]

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

jobs:

  prepare_version:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v6
        with:
          node-version: 24

      - name: Install semantic-release
        run: |
          npm install --no-fund --no-audit \
            semantic-release \
            @semantic-release/github \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            conventional-changelog-conventionalcommits

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "canary")
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT


  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@017a9effdb900e5b5b2fddfb59d3b1b9b3a1c5b1 # v5

      - name: Test + Coverage + Sonar
        run: |
          ./gradlew clean test jacocoTestReport sonar \
            --no-daemon \
            --info --stacktrace \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=true


  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [prepare_version, quality]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@017a9effdb900e5b5b2fddfb59d3b1b9b3a1c5b1 # v5

      - name: Build jar
        run: |
          ./gradlew bootJar \
            -Pversion=${{ needs.prepare_version.outputs.version }} \
            --no-daemon

      - uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v6
        with:
          name: ordering-service
          path: build/libs/*.jar