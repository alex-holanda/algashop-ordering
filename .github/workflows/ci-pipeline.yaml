name: CI Pipeline

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ main ]

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

env:
  IMAGE_NAME: ${{ github.repository }}
  PROJECT_KEY: ${{ github.repository_owner }}_${{ github.event.repository.name }}
  SONAR_ORGANIZATION: ${{ github.repository_owner }}

jobs:

  ensure_sonar_project:
    runs-on: ubuntu-latest

    steps:
      - name: Ensure SonarCloud project exists
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |

          echo "Checking SonarCloud project..."

          EXISTS=$(curl -s -u $SONAR_TOKEN: \
            "https://sonarcloud.io/api/projects/search?projects=${PROJECT_KEY}" \
            | jq '.components | length')

          if [ "$EXISTS" -eq "0" ]; then
            echo "Creating SonarCloud project..."

            curl -s -u $SONAR_TOKEN: \
              -X POST "https://sonarcloud.io/api/projects/create" \
              -d "project=${PROJECT_KEY}" \
              -d "organization=${SONAR_ORGANIZATION}" \
              -d "name=${{ github.event.repository.name }}"

          else
            echo "SonarCloud project already exists"
          fi

  prepare_version:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: ensure_sonar_project

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install semantic-release
        run: |
          npm install --no-fund --no-audit \
            semantic-release \
            @semantic-release/github \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            conventional-changelog-conventionalcommits

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "canary")
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  quality:
    runs-on: ubuntu-latest
    needs: ensure_sonar_project

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: gradle/actions/setup-gradle@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Run tests + coverage + sonar
        run: |
          ./gradlew clean build jacocoTestReport sonar \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.branch.name=${{ github.ref_name }}

  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [prepare_version, quality]

    steps:
      - uses: actions/checkout@v5

      - uses: gradle/actions/setup-gradle@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Build jar
        run: |
          ./gradlew bootJar -Pversion=${{ needs.prepare_version.outputs.version }}

      - uses: actions/upload-artifact@v6
        with:
          name: build-artifact
          path: build/libs/*.jar
