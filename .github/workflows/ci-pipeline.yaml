name: CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

env:
  IMAGE_NAME: alexholanda/ordering-service


jobs:
  prepare_version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - name: Determine version
        id: version
        run: |
          if [ ! -f .VERSION ]; then
            echo "canary" > .VERSION
          fi
          VERSION=$(cat .VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: prepare_version
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Build jar
        run: ./gradlew clean bootJar -Pversion=${{ needs.prepare_version.outputs.version }}

      - uses: actions/upload-artifact@v6
        with:
          name: ordering-service-jar
          path: build/libs/*.jar
