name: CI

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ main ]

jobs:

  quality:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
        with:
          egress-policy: audit

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      - name: Run tests
        run: |
          ./gradlew test jacocoTestReport \
            --no-daemon

      - name: Upload HTML Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: build/reports/tests/test

      - name: Run Sonar Analysis
        run: |
          ./gradlew sonar \
            --no-daemon \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=true


  prepare_version:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: quality

    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
        with:
          egress-policy: audit

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "canary")
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT


  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: prepare_version

    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
        with:
          egress-policy: audit

      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      - name: Build jar
        run: |
          ./gradlew bootJar \
            -Pversion=${{ needs.prepare_version.outputs.version }} \
            --no-daemon

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ordering-service
          path: build/libs/*.jar