name: CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

env:
  IMAGE_NAME: alexholanda/ordering-service


jobs:
  prepare_version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          check-latest: true

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: version
        run: |
          if [ -f .VERSION ]; then
            VERSION=$(cat .VERSION)
          else
            VERSION=canary
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    needs: prepare_version
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Run tests
        run: ./gradlew test --info --stacktrace

      - uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: |
            build/reports/tests
            build/test-results

  build:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Build jar
        run: ./gradlew clean bootJar -Pversion=${{ needs.prepare_version.outputs.version }}

      - uses: actions/upload-artifact@v6
        with:
          name: ordering-service-jar
          path: build/libs/*.jar
