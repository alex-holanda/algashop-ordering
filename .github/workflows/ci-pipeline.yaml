name: CI

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ main ]

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

jobs:

  prepare_version:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install semantic-release
        run: |
          npm install --no-fund --no-audit \
            semantic-release \
            @semantic-release/github \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            conventional-changelog-conventionalcommits

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "canary")
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  quality:
    runs-on: ubuntu-latest
    needs: prepare_version
    if: always()

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: gradle/actions/setup-gradle@v3

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Test + Coverage + Sonar
        run: |
          ./gradlew clean build jacocoTestReport sonar \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.branch.name=${{ github.ref_name }}

  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [prepare_version, quality]

    steps:
      - uses: actions/checkout@v5

      - uses: gradle/actions/setup-gradle@v3

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Build jar
        run: |
          ./gradlew bootJar -Pversion=${{ needs.prepare_version.outputs.version }}

      - uses: actions/upload-artifact@v6
        with:
          name: ordering-service
          path: build/libs/*.jar