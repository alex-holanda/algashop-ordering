name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ main ]

env:
  IMAGE_NAME: alexholanda/algashop-ordering-service

jobs:

  # ------------------------------------------------
  # QUALITY
  # ------------------------------------------------

  quality:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc
        with:
          egress-policy: audit

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      - name: Run tests
        run: |
          ./gradlew test jacocoTestReport \
            --no-daemon \
            --info --stacktrace

      - name: Upload HTML Test Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: build/reports/tests/test

      - name: Run Sonar Analysis
        run: |
          ./gradlew sonar \
            --no-daemon \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=true
  

  # ------------------------------------------------
  # RELEASE
  # ------------------------------------------------

  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: quality

    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc
        with:
          egress-policy: audit

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install semantic-release
        run: |
          npm install --no-fund --no-audit --ignore-scripts \
            semantic-release \
            @semantic-release/github \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            conventional-changelog-conventionalcommits

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "canary")
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
  

  # ------------------------------------------------
  # BUILD
  # ------------------------------------------------

  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: release

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      - name: Build jar
        run: |
          ./gradlew bootJar \
            -Pversion=${{ needs.release.outputs.version }} \
            --no-daemon

      # NOVO STEP
      - name: Generate SBOM
        run: |
          ./gradlew cyclonedxBom --no-daemon

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ordering-service
          path: build/libs/*.jar

      # NOVO ARTIFACT
      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: build/reports/bom.json


  # ------------------------------------------------
  # DOCKER BUILD
  # ------------------------------------------------

  docker_build_and_push:
    runs-on: ubuntu-latest
    needs: [build, release]

    steps:
      - uses: actions/checkout@v5

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ordering-service
          path: build/libs

      - name: Detect jar name
        id: jar
        run: |
          JAR=$(basename build/libs/*.jar)
          echo "jar=$JAR" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_SECRET }}

      - name: Docker build and push
        id: push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            JAR_NAME=${{ steps.jar.outputs.jar }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.release.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Save image digest
        run: |
          echo "${{ steps.push.outputs.digest }}" > digest.txt

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: image-digest
          path: digest.txt
  

  # ------------------------------------------------
  # SECURITY SCAN
  # ------------------------------------------------

  docker_security_scan:
    runs-on: ubuntu-latest
    needs: docker_build_and_push

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image-digest

      - name: Read digest
        id: digest
        run: |
          DIGEST=$(cat digest.txt)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Scan image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.digest.outputs.digest }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1


  # ------------------------------------------------
  # SIGN IMAGE
  # ------------------------------------------------

  sign_image:
    runs-on: ubuntu-latest
    needs: docker_security_scan

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22

      - uses: actions/download-artifact@v4
        with:
          name: image-digest

      - name: Read digest
        id: digest
        run: |
          DIGEST=$(cat digest.txt)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_SECRET }}

      - name: Sign image
        run: |
          cosign sign --yes \
            ${{ env.IMAGE_NAME }}@${{ steps.digest.outputs.digest }}
  

  # ------------------------------------------------
  # VERIFY SIGNATURE
  # ------------------------------------------------

  verify_signature:
    runs-on: ubuntu-latest
    needs: sign_image

    steps:
      - uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22

      - uses: actions/download-artifact@v4
        with:
          name: image-digest

      - name: Read digest
        id: digest
        run: |
          DIGEST=$(cat digest.txt)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/alex-holanda/algashop-ordering/.github/workflows/.*" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            ${{ env.IMAGE_NAME }}@${{ steps.digest.outputs.digest }}
          

  attest_sbom:
    runs-on: ubuntu-latest
    needs: verify_signature

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22

      - uses: actions/download-artifact@v4
        with:
          name: sbom

      - uses: actions/download-artifact@v4
        with:
          name: image-digest

      - name: Read digest
        id: digest
        run: |
          DIGEST=$(cat digest.txt)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Attach SBOM attestation
        run: |
          cosign attest \
            --yes \
            --predicate bom.json \
            --type cyclonedx \
            ${{ env.IMAGE_NAME }}@${{ steps.digest.outputs.digest }}