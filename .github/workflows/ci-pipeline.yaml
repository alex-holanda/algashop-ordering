name: CI

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ main ]

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

jobs:

  prepare_version:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@3df4a7d2f6b8e1b2f7d8c9e6d4b7c3e1a2f9b8c7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@1a2b3c4d5e6f7890abcdef1234567890abcdef12
        with:
          node-version: 24

      - name: Install semantic-release
        run: |
          npm install --no-fund --no-audit \
            semantic-release \
            @semantic-release/github \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            conventional-changelog-conventionalcommits

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "canary")
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT


  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3df4a7d2f6b8e1b2f7d8c9e6d4b7c3e1a2f9b8c7
        with:
          fetch-depth: 0

      - uses: actions/setup-java@9c4c0f9a7b7f1c3e6d9c5e2f1b3a6c8d7e5f4a3b
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@2f9a1b3c7e5d4c8f6a9e1b2c3d4e5f6a7b8c9d0e

      - name: Test + Coverage + Sonar
        run: |
          ./gradlew clean test jacocoTestReport sonar \
            --no-daemon \
            --info --stacktrace \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=true


  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [prepare_version, quality]

    steps:
      - uses: actions/checkout@3df4a7d2f6b8e1b2f7d8c9e6d4b7c3e1a2f9b8c7

      - uses: actions/setup-java@9c4c0f9a7b7f1c3e6d9c5e2f1b3a6c8d7e5f4a3b
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@2f9a1b3c7e5d4c8f6a9e1b2c3d4e5f6a7b8c9d0e

      - name: Build jar
        run: |
          ./gradlew bootJar \
            -Pversion=${{ needs.prepare_version.outputs.version }} \
            --no-daemon

      - uses: actions/upload-artifact@8a1b2c3d4e5f67890abcdef1234567890abcdef1
        with:
          name: ordering-service
          path: build/libs/*.jar